<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kaos Theory Poker</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --felt: #050a0f;
  --table-border: #00f3ff;
  --neon-cyan: #00f3ff;
  --neon-magenta: #ff003c;
  --white: #ffffff;
  --dim: #445b73;
  --border: rgba(0, 243, 255, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

body {
  background: #020617; color: #e2e8f0;
  font-family: 'Rajdhani', sans-serif;
  height: 100vh; height: 100dvh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 1.5rem; background: rgba(2, 6, 23, 0.9);
  border-bottom: 1px solid var(--border); box-shadow: 0 0 15px rgba(0,243,255,0.05);
  flex-shrink: 0; z-index: 10;
}
.header-logo { display: flex; align-items: center; gap: 0.75rem; }
.header-logo span { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 900; letter-spacing: 0.15em; color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,243,255,0.4); }
.game-info { display: flex; gap: 2.5rem; align-items: center; }
.game-info-item { display: flex; flex-direction: column; align-items: center; }
.game-info-label { font-family: 'Orbitron', sans-serif; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; }
.game-info-value { font-size: 1.1rem; font-weight: 700; color: #fff; }
.game-code { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 0.2em; color: var(--neon-magenta); text-shadow: 0 0 10px rgba(255,0,60,0.4); }

/* ── MAIN LAYOUT ── */
.game-layout { display: flex; flex: 1; overflow: hidden; flex-direction: row; }

/* ── TABLE AREA ── */
.table-area {
  flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #0a192f 0%, #020617 80%); overflow: hidden;
}

.poker-table {
  position: relative; width: 95vw; max-width: 120vh; aspect-ratio: 1.5; 
  background: url('/images/PokerTable.png') center/100% 100% no-repeat; border: none;
}
.table-glow {
  position: absolute; inset: 0; border-radius: 80px; box-shadow: 0 0 80px rgba(0,243,255,0.2); pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.table-glow.my-turn { opacity: 1; border: 2px solid var(--neon-magenta); box-shadow: 0 0 80px rgba(255,0,60,0.3); }

/* ── COMMUNITY CARDS ── */
.community-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; z-index: 5; }
.pot-display { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,243,255,0.5); }
.pot-amount { color: #fff; font-size: 1.5rem; }
.community-cards { display: flex; gap: 10px; }

/* SHOWDOWN BANNER */
.showdown-banner {
  position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  background: rgba(2, 6, 23, 0.95); border: 2px solid var(--neon-cyan);
  color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900;
  padding: 8px 24px; border-radius: 8px; z-index: 50;
  box-shadow: 0 0 20px rgba(0,243,255,0.4); text-align: center;
  white-space: nowrap; text-transform: uppercase; letter-spacing: 0.1em;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.showdown-banner.show { opacity: 1; }

/* ── ANIMATIONS & HOLOGRAMS ── */
@keyframes cyberRez {
  0% { opacity: 0; transform: scale(0.4) translateZ(-100px) rotate(-15deg); filter: blur(5px) brightness(2.5); }
  100% { opacity: 1; transform: scale(1) translateZ(0) rotate(0deg); filter: blur(0) brightness(1); }
}
.cyber-rez { animation: cyberRez 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }

@keyframes floatUpFade {
  0% { opacity: 0; transform: translate(-50%, -40px) scale(0.5); }
  15% { opacity: 1; transform: translate(-50%, -55px) scale(1.1); }
  80% { opacity: 1; transform: translate(-50%, -80px) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -90px) scale(0.8); }
}
.floating-chat {
  position: absolute; z-index: 100;
  background: rgba(0, 243, 255, 0.15); border: 1px solid var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0,243,255,0.3); color: #fff;
  font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700;
  padding: 6px 12px; border-radius: 8px; pointer-events: none;
  white-space: nowrap; text-shadow: 0 0 5px rgba(0,243,255,0.8);
  animation: floatUpFade 3.5s ease-out forwards;
}

.card-wrapper { transition: transform 0.2s; filter: drop-shadow(0 6px 8px rgba(0,0,0,0.6)); display: flex; flex-shrink: 0; }
.community-cards .card-wrapper { width: 85px; height: 118px; }
.my-hand-cards .card-wrapper { width: 120px; height: 165px; } 

.card-highlight { box-shadow: 0 0 20px var(--neon-magenta) !important; transform: translateY(-10px) !important; z-index: 30; border-radius: 4px; }
.card-highlight svg rect { stroke: var(--neon-magenta) !important; stroke-width: 3px !important; }
.card-dimmed { opacity: 0.3 !important; filter: grayscale(1) !important; }

/* ── SEATS & AVATARS ── */
.seat-container { position: absolute; inset: 0; pointer-events: none; }
.seat { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); z-index: 10; }

.seat-avatar { 
  width: 76px; height: 76px; border-radius: 50%; background-color: #0a192f; 
  border: 2px solid rgba(0,243,255,0.2); display: flex; align-items: center; 
  justify-content: center; font-family: 'Orbitron', sans-serif; 
  font-size: 1.6rem; font-weight: 900; color: rgba(0,243,255,0.4); 
  transition: all 0.3s; position: relative; 
}
.seat-avatar.has-sprite { color: transparent !important; }
.avatar-sprite { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; pointer-events: none; }
.avatar-sprite::before {
  content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 145%; height: 145%; background-image: url('/images/Avatar-Select.png'); background-size: 500% 300%; background-position: inherit;
}

.action-tag {
  position: absolute; top: -8px; right: -15px; font-family: 'Orbitron'; font-weight: 900; font-size: 0.65rem; 
  padding: 3px 6px; border-radius: 4px; z-index: 25; text-transform: uppercase; letter-spacing: 0.1em; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
}
.action-tag.check, .action-tag.call { background: #f8fafc; color: #0f172a; border: 1px solid #cbd5e1; }
.action-tag.fold { background: #334155; color: #94a3b8; border: 1px solid #475569; }
.action-tag.raise { background: var(--neon-magenta); color: #fff; border: 1px solid #fff; box-shadow: 0 0 10px var(--neon-magenta); }
.action-tag.allin { background: var(--neon-magenta); color: #fff; border: 1px solid #fff; box-shadow: 0 0 15px var(--neon-magenta); animation: pulse-allin 0.8s infinite alternate; }
@keyframes pulse-allin { 0% { box-shadow: 0 0 5px var(--neon-magenta); transform: scale(1); } 100% { box-shadow: 0 0 20px var(--neon-magenta); transform: scale(1.1); } }

.seat-cards { display: flex; gap: -35px; position: absolute; top: -10px; right: 65px; z-index: 21; }
.seat-cards .card-wrapper { width: 60px; height: 84px; transition: transform 0.2s; }
.seat-cards .card-wrapper:nth-child(1) { transform: rotate(-10deg) translateY(5px); }
.seat-cards .card-wrapper:nth-child(2) { transform: rotate(5deg) translateY(-2px); box-shadow: -4px 0 10px rgba(0,0,0,0.4); }

.seat.occupied .seat-avatar { color: #fff; border-color: rgba(0,243,255,0.6); }
.seat.is-me .seat-avatar { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,243,255,0.4); }
.seat.active-player .seat-avatar { border-color: var(--neon-magenta); box-shadow: 0 0 25px rgba(255,0,60,0.5); }
.seat.folded { opacity: 0.4; filter: grayscale(1); }
.seat.is-busted { opacity: 0.5; filter: grayscale(1) sepia(1) hue-rotate(-50deg); pointer-events: none; }
.seat.is-waiting { opacity: 0.7; pointer-events: none; }

.waiting-text { position: absolute; color: var(--neon-cyan); font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; background: rgba(2,6,23,0.9); padding: 4px 8px; border: 1px solid var(--neon-cyan); border-radius: 4px; z-index: 20; transform: rotate(-10deg); top: 15px; box-shadow: 0 0 10px rgba(0,243,255,0.5); }
.busted-text { position: absolute; color: var(--neon-magenta); font-family: 'Orbitron'; font-weight: 900; font-size: 0.85rem; background: rgba(2,6,23,0.9); padding: 4px 8px; border: 1px solid var(--neon-magenta); border-radius: 4px; z-index: 20; transform: rotate(-15deg); top: 15px; box-shadow: 0 0 10px rgba(255,0,60,0.5); }
.offline-text { position: absolute; color: #cbd5e1; font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; background: rgba(2,6,23,0.9); padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 4px; z-index: 20; transform: rotate(10deg); top: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.8); }

.seat-name, .seat-chips, .seat-bet { white-space: nowrap; line-height: 1.2; }
.seat-name { font-size: 0.95rem; font-weight: 700; color: #cbd5e1; background: rgba(2,6,23,0.8); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); margin-top: 6px; }
.seat-chips { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--neon-cyan); margin-top: 4px; }
.seat-bet { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: #fff; min-height: 16px; margin-top: 4px; }

/* ── SIDEBAR ── */
.sidebar { width: 320px; display: flex; flex-direction: column; background: #020617; border-left: 1px solid var(--border); z-index: 20; overflow-y: auto; }
.my-hand-panel { padding: 1.5rem; border-bottom: 1px solid var(--border); text-align: center; flex-shrink: 0; }
.my-hand-cards { display: flex; justify-content: center; gap: 10px; margin: 1rem 0; min-height: 165px; }
.auto-rebuy-box { margin-top: 1rem; border-top: 1px dashed var(--border); padding-top: 1rem; text-align: left; }
.action-panel { padding: 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
.action-btn { padding: 0.8rem; background: rgba(0,243,255,0.05); border: 1px solid var(--border); color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
.action-btn:hover:not(:disabled) { background: rgba(0,243,255,0.15); box-shadow: 0 0 10px rgba(0,243,255,0.2); }
.action-btn:disabled { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
.action-btn.fold-btn { color: #cbd5e1; border-color: rgba(255,255,255,0.2); }
.action-btn.raise-btn, .action-btn.allin-btn { color: var(--neon-magenta); border-color: rgba(255,0,60,0.3); }
.action-btn.raise-btn:hover:not(:disabled) { background: rgba(255,0,60,0.1); box-shadow: 0 0 10px rgba(255,0,60,0.2); }
.raise-row { display: flex; gap: 0.5rem; align-items: stretch; width: 100%; }
.raise-input { flex: 1; min-width: 0; background: rgba(2,6,23,0.8); border: 1px solid var(--border); color: #fff; padding: 0.5rem; font-family: 'Orbitron', sans-serif; font-size: 1rem; text-align: center; }
.action-btn.raise-btn { flex-shrink: 0; padding-left: 1.5rem; padding-right: 1.5rem; }

.chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 200px; flex-shrink: 0; }
.chat-messages { flex: 1; overflow-y: auto; padding: 1rem; font-size: 0.85rem; }
.chat-input-row { display: flex; padding: 1rem; border-top: 1px solid var(--border); }
.chat-input { flex: 1; background: #0a192f; border: 1px solid var(--border); color: #fff; padding: 0.5rem; }
.chat-send { background: var(--neon-cyan); border: none; color: #000; padding: 0 1rem; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 850px) {
  .header { padding: 0.5rem; }
  .header-logo span { font-size: 0.75rem; }
  .game-info { gap: 1rem; }
  .game-info-value { font-size: 0.9rem; }
  .game-code { font-size: 0.9rem; }
  .game-layout { flex-direction: column; }
  .table-area { flex: none; height: 45dvh; min-height: 250px; }
  .sidebar { width: 100%; flex: 1; height: auto; border-left: none; border-top: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .my-hand-panel { padding: 1rem; border-bottom: 1px solid var(--border); }
  .my-hand-cards { min-height: 110px; }
  .action-panel { padding: 1rem; }
  .chat-panel { min-height: 150px; }
  .seat-avatar { width: 50px; height: 50px; font-size: 1.2rem; }
  .seat-name { font-size: 0.75rem; padding: 2px 6px; margin-top: 4px; }
  .seat-chips { font-size: 0.65rem; margin-top: 2px; }
  .seat-bet { font-size: 0.65rem; min-height: 12px; margin-top: 2px; }
  .community-cards .card-wrapper { width: 45px; height: 63px; }
  .pot-amount { font-size: 1.2rem; }
  .my-hand-cards .card-wrapper { width: 80px; height: 110px; }
  .busted-text { font-size: 0.65rem; padding: 2px 4px; top: 10px; }
  .waiting-text { font-size: 0.6rem; padding: 2px 4px; top: 10px; }
  .action-tag { font-size: 0.55rem; padding: 2px 4px; right: -10px; top: -5px; }
  .seat-cards .card-wrapper { width: 38px; height: 53px; }
  .seat-cards { top: -5px; right: 40px; gap: -20px; }
  .showdown-banner { font-size: 0.7rem; top: -35px; padding: 6px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo"><span>KAOS THEORY</span></div>
  <div class="game-info">
    <div class="game-info-item"><span class="game-info-label">Blinds</span><span class="game-info-value" id="hdr-blinds">--/--</span></div>
    <div class="game-info-item"><span class="game-info-label">Hand</span><span class="game-info-value" id="hdr-hand">#0</span></div>
  </div>
  <div class="game-code">CODE: <span id="hdr-code" style="color:#fff">------</span></div>
</div>

<div class="game-layout">
  <div class="table-area">
    <div class="poker-table" id="poker-table">
      <div class="table-glow" id="table-glow"></div>
      
      <div class="community-area">
        <div class="pot-display">POT: <span class="pot-amount" id="pot-amount">0</span></div>
        <div style="position:relative; display:flex; justify-content:center;">
            <div id="showdown-banner" class="showdown-banner"></div>
            <div class="community-cards" id="community-cards"></div>
        </div>
        <div id="phase-label" style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon-magenta); margin-top:0.5rem; text-transform:uppercase; letter-spacing: 0.2em;"></div>
      </div>

      <div class="seat-container" id="seats-layer"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="action-panel" id="host-panel" style="display:none; padding-bottom: 0;">
      <button class="action-btn" id="host-btn" style="width:100%; border-color:var(--neon-cyan)" onclick="startGame()">Init Hand_Sequence</button>
    </div>

    <div class="my-hand-panel">
      <div style="font-family:'Orbitron'; font-size:0.6rem; color:var(--dim); letter-spacing:0.15em;">LOCAL UPLINK_CARDS</div>
      <div class="my-hand-cards" id="my-cards"></div>
      
      <div class="auto-rebuy-box" id="auto-rebuy-box" style="display:none;">
        <label style="color:var(--neon-cyan); display:flex; align-items:center; justify-content:center; gap:0.5rem; font-size:0.75rem; cursor:pointer; font-family:'Orbitron'; font-weight:700;">
          <input type="checkbox" id="cb-auto-rebuy" onchange="toggleAutoRebuy(this.checked)" />
          AUTO-REBUY (COST: <span id="lbl-rebuy-amt"></span>)
        </label>
        <div style="font-size: 0.65rem; color:var(--dim); margin-top:0.5rem; font-family:'Orbitron'; text-align:center;">
          REBUYS USED: <span id="lbl-rebuy-count" style="color:#fff">0</span> / <span id="lbl-rebuy-max" style="color:#fff">∞</span>
        </div>
      </div>
    </div>

    <div class="action-panel" id="action-panel">
      <div id="clock-container" style="display:none; margin-bottom: 1.5rem;">
        <div style="font-family:'Orbitron'; font-size:0.6rem; color:var(--neon-cyan); letter-spacing:0.1em; text-align:center; margin-bottom:6px;">SHOT CLOCK</div>
        <div style="width: 100%; height: 8px; background: #020617; border: 1px solid var(--border); border-radius: 4px; overflow: hidden;">
          <div id="clock-bar" style="height: 100%; width: 100%; background: var(--neon-cyan); transition: width 1s linear, background 0.3s;"></div>
        </div>
      </div>

      <div id="not-your-turn" style="text-align:center; color:var(--dim); font-family:'Orbitron'; font-size:0.7rem;">AWAITING NETWORK ACTION...</div>
      
      <div id="your-turn-controls" style="display:none">
        <div class="action-btns">
          <button class="action-btn fold-btn" onclick="doAction('fold')">Fold</button>
          <button class="action-btn" id="btn-check" onclick="doAction('check')">Check</button>
          <button class="action-btn" id="btn-call" onclick="doAction('call')">Call <span id="call-amount"></span></button>
          <button class="action-btn allin-btn" onclick="doAction('allin')">All-In</button>
        </div>
        <div class="raise-row">
          <input type="number" class="raise-input" id="raise-input" />
          <button class="action-btn raise-btn" onclick="doAction('raise')">Raise</button>
        </div>
      </div>

      <div id="manual-rebuy-controls" style="display:none; text-align:center;">
        <div style="color:var(--neon-magenta); font-family:'Orbitron'; font-size:0.85rem; font-weight:900; margin-bottom: 1rem; letter-spacing:0.1em;">STACK DEPLETED</div>
        <button class="action-btn raise-btn" style="width:100%;" onclick="doRebuy()">MANUAL REBUY</button>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" placeholder="Transmit..." onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="chat-send" onclick="sendChat()">></button>
      </div>
    </div>
  </div>
</div>

<script>
// --- AUDIO MANAGER ---
let audioUnlocked = false;
const sfx = { deal: new Audio('/sounds/deal.mp3'), fold: new Audio('/sounds/fold.mp3'), chips: new Audio('/sounds/chips.mp3'), win: new Audio('/sounds/win.mp3'), alarm: new Audio('/sounds/alarm.mp3') };

function unlockAudio() {
  if (audioUnlocked) return;
  Object.values(sfx).forEach(sound => { sound.volume = 0; sound.play().catch(()=>{}); sound.pause(); sound.currentTime = 0; sound.volume = 1; });
  audioUnlocked = true; document.removeEventListener('click', unlockAudio);
}
document.addEventListener('click', unlockAudio);

function playSfx(name) { if (audioUnlocked && sfx[name]) { sfx[name].currentTime = 0; sfx[name].play().catch(()=>{}); } }

// --- GAME LOGIC & SESSION PERSISTENCE ---
const params = new URLSearchParams(window.location.search);
const gameId = params.get('id');
const myName = sessionStorage.getItem('playerName') || 'Guest';
const myAvatarId = parseInt(sessionStorage.getItem('avatarId')) || 0; 

let myToken = localStorage.getItem('kaos_token');
if (!myToken) {
    myToken = Math.random().toString(36).substring(2, 15);
    localStorage.setItem('kaos_token', myToken);
}

let socket = io();
let gameState = null;
let prevCommCardsCount = 0;
let winningCards = []; 

// THE FIX: Dynamic Table Balancing Algorithm
function getSeatPosition(visualIdx, maxPlayers) {
  const layouts = {
    2: [{left:'50%', top:'95%'}, {left:'50%', top:'5%'}],
    3: [{left:'50%', top:'95%'}, {left:'85%', top:'20%'}, {left:'15%', top:'20%'}],
    4: [{left:'50%', top:'95%'}, {left:'90%', top:'50%'}, {left:'50%', top:'5%'}, {left:'10%', top:'50%'}],
    5: [{left:'50%', top:'95%'}, {left:'90%', top:'60%'}, {left:'80%', top:'15%'}, {left:'20%', top:'15%'}, {left:'10%', top:'60%'}],
    6: [{left:'50%', top:'95%'}, {left:'85%', top:'80%'}, {left:'95%', top:'25%'}, {left:'50%', top:'5%'}, {left:'5%', top:'25%'}, {left:'15%', top:'80%'}],
    7: [{left:'50%', top:'95%'}, {left:'85%', top:'85%'}, {left:'95%', top:'50%'}, {left:'80%', top:'10%'}, {left:'20%', top:'10%'}, {left:'5%', top:'50%'}, {left:'15%', top:'85%'}],
    8: [{left:'50%', top:'95%'}, {left:'75%', top:'95%'}, {left:'95%', top:'50%'}, {left:'75%', top:'5%'}, {left:'50%', top:'5%'}, {left:'25%', top:'5%'}, {left:'5%', top:'50%'}, {left:'25%', top:'95%'}],
    9: [{left:'50%', top:'95%'}, {left:'80%', top:'90%'}, {left:'95%', top:'60%'}, {left:'90%', top:'20%'}, {left:'60%', top:'5%'}, {left:'40%', top:'5%'}, {left:'10%', top:'20%'}, {left:'5%', top:'60%'}, {left:'20%', top:'90%'}],
    10: [{left:'50%', top:'95%'}, {left:'75%', top:'90%'}, {left:'95%', top:'65%'}, {left:'95%', top:'35%'}, {left:'75%', top:'10%'}, {left:'50%', top:'5%'}, {left:'25%', top:'10%'}, {left:'5%', top:'35%'}, {left:'5%', top:'65%'}, {left:'25%', top:'90%'}]
  };
  const layout = layouts[maxPlayers] || layouts[8];
  return layout[visualIdx] || { left: '50%', top: '50%' };
}

socket.on('connect', () => { 
    socket.emit('join_game', { gameId, name: myName, avatarId: myAvatarId, asSpectator: false, token: myToken }); 
});

socket.on('hand_started', () => { playSfx('deal'); });

socket.on('game_state', (state) => {
  if (gameState && state.communityCards.length > prevCommCardsCount) { playSfx('deal'); }
  prevCommCardsCount = state.communityCards.length;
  gameState = state;
  renderState(state);
});

socket.on('clock_tick', (data) => {
  document.getElementById('clock-container').style.display = 'block';
  const pct = (data.seconds / 60) * 100;
  const bar = document.getElementById('clock-bar'); bar.style.width = pct + '%';
  if (data.seconds <= 5) {
      bar.style.background = 'var(--neon-magenta)'; bar.style.boxShadow = '0 0 10px var(--neon-magenta)';
      if (gameState && gameState.seats[data.actionSeat] === myToken) playSfx('alarm');
  } else {
      bar.style.background = 'var(--neon-cyan)'; bar.style.boxShadow = 'none';
  }
});

socket.on('clock_clear', () => {
  document.getElementById('clock-container').style.display = 'none';
  const bar = document.getElementById('clock-bar'); bar.style.width = '100%'; bar.style.background = 'var(--neon-cyan)'; bar.style.boxShadow = 'none';
});

socket.on('showdown', (result) => {
  playSfx('win'); 
  winningCards = [];
  
  let winnersText = result.results.map(pot => {
    if (pot.bestCards) pot.bestCards.forEach(c => winningCards.push(c.rank + c.suit));
    return `${pot.players.map(p=>p.name).join(' & ')} WINS ${pot.pot} CHIPS WITH ${pot.handName || 'UNCONTESTED POT'}`;
  }).join(' <br> ');

  const banner = document.getElementById('showdown-banner');
  if (banner) {
      banner.innerHTML = `🏆 ${winnersText} 🏆`;
      banner.classList.add('show');
  }
  
  if (gameState) renderState(gameState);

  setTimeout(() => { 
    if (banner) banner.classList.remove('show');
    winningCards = [];
    if (gameState) renderState(gameState);
  }, 7500);
});

socket.on('chat', (data) => {
  const box = document.getElementById('chat-messages');
  box.innerHTML += `<div style="margin-bottom:4px"><span style="color:var(--neon-cyan)">[${data.name || 'SYS'}]</span> ${data.msg}</div>`;
  box.scrollTop = box.scrollHeight;

  if (!data.system && data.token && gameState) {
      let myIdx = gameState.seats.indexOf(myToken);
      if (myIdx === -1) myIdx = 0;
      
      const playerIdx = gameState.seats.indexOf(data.token);
      if (playerIdx !== -1) {
          const visualIdx = (playerIdx - myIdx + gameState.maxPlayers) % gameState.maxPlayers;
          const pos = getSeatPosition(visualIdx, gameState.maxPlayers);

          const bubble = document.createElement('div');
          bubble.className = 'floating-chat';
          
          let safeMsg = data.msg;
          if (safeMsg.length > 28) safeMsg = safeMsg.substring(0, 28) + '...';
          bubble.textContent = safeMsg;
          
          bubble.style.left = pos.left;
          bubble.style.top = pos.top;
          
          document.getElementById('poker-table').appendChild(bubble);
          setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 3500);
      }
  }
});

function getSvgCard(rank, suit, faceDown=false, isHighlight=false, isDim=false, cardBack='card-back.png') {
  if (faceDown) return `<div class="card-wrapper face-down cyber-rez"><img src="/images/${cardBack}" alt="Back" style="width:100%; height:100%; border-radius:4px; object-fit:cover; border: 1px solid #334155; background-color: #0f172a;" onerror="this.onerror=null; this.src='/images/logo.png';"/></div>`;
  const isRed = (suit === 'h' || suit === 'd'); const textColor = isRed ? '#dc2626' : '#0f172a'; const bgColor = '#f8fafc'; const borderColor = '#cbd5e1';
  const symbols = { s: '♠', h: '♥', d: '♦', c: '♣' }; const s = symbols[suit]; const displayRank = rank === 'T' ? '10' : rank;
  
  let extraClass = '';
  if (isHighlight) extraClass = ' card-highlight';
  if (isDim) extraClass = ' card-dimmed';
  
  return `<div class="card-wrapper cyber-rez${extraClass}"><svg viewBox="0 0 80 110" preserveAspectRatio="xMidYMid meet" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="display:block;"><rect x="10" y="10" width="60" height="90" rx="4" fill="${bgColor}" stroke="${borderColor}" stroke-width="1.5"/><text x="20" y="28" fill="${textColor}" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">${displayRank}</text><text x="20" y="44" fill="${textColor}" font-family="sans-serif" font-size="14" text-anchor="middle">${s}</text><text x="40" y="64" fill="${textColor}" font-family="sans-serif" font-size="32" text-anchor="middle">${s}</text><text x="60" y="82" fill="${textColor}" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle" transform="rotate(180 60 82)">${displayRank}</text><text x="60" y="66" fill="${textColor}" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(180 60 66)">${s}</text></svg></div>`;
}

function renderState(state) {
  document.getElementById('hdr-code').textContent = state.gameId;
  document.getElementById('hdr-blinds').textContent = `${state.smallBlind}/${state.bigBlind}`;
  document.getElementById('hdr-hand').textContent = `#${state.handCount}`; 
  document.getElementById('pot-amount').textContent = state.pot;
  document.getElementById('phase-label').textContent = state.phase !== 'waiting' ? `PHASE: ${state.phase}` : '';

  const isHost = (state.hostToken === myToken);

  if (isHost) {
    document.getElementById('host-panel').style.display = 'block';
    if (state.phase === 'waiting') {
      document.getElementById('host-btn').textContent = 'Init Hand_Sequence'; document.getElementById('host-btn').onclick = startGame; document.getElementById('host-btn').style.borderColor = 'var(--neon-cyan)'; document.getElementById('host-btn').style.color = 'var(--neon-cyan)'; document.getElementById('host-btn').disabled = false;
    } else if (state.phase === 'game_over') {
      document.getElementById('host-btn').textContent = 'RESTART TOURNAMENT'; document.getElementById('host-btn').onclick = restartTournament; document.getElementById('host-btn').style.borderColor = 'var(--neon-magenta)'; document.getElementById('host-btn').style.color = 'var(--neon-magenta)'; document.getElementById('host-btn').disabled = false;
    } else {
      if (document.getElementById('clock-container').style.display === 'none' || document.getElementById('clock-container').style.display === '') {
          document.getElementById('host-btn').textContent = 'CALL CLOCK (60S)'; document.getElementById('host-btn').onclick = callClock; document.getElementById('host-btn').style.borderColor = 'var(--neon-magenta)'; document.getElementById('host-btn').style.color = 'var(--neon-magenta)'; document.getElementById('host-btn').disabled = false;
      }
    }
  } else {
      document.getElementById('host-panel').style.display = 'none';
  }

  let myIdx = state.seats.indexOf(myToken);
  if (myIdx === -1) myIdx = 0;

  const myPlayer = state.players[myToken];

  if (state.allowRebuy && myPlayer) {
     document.getElementById('auto-rebuy-box').style.display = 'block'; document.getElementById('lbl-rebuy-amt').textContent = state.rebuyAmount; document.getElementById('lbl-rebuy-count').textContent = myPlayer.rebuyCount; document.getElementById('lbl-rebuy-max').innerHTML = state.maxRebuys === -1 ? '&infin;' : state.maxRebuys; document.getElementById('cb-auto-rebuy').checked = myPlayer.autoRebuy;
  } else { document.getElementById('auto-rebuy-box').style.display = 'none'; }

  document.getElementById('my-cards').innerHTML = '';
  const isShowdownReveal = winningCards.length > 0;

  let seatsHtml = '';
  for (let i = 0; i < state.maxPlayers; i++) {
    const sId = state.seats[i]; const player = sId ? state.players[sId] : null;
    if (!player) continue;

    const visualIdx = (i - myIdx + state.maxPlayers) % state.maxPlayers; 
    const pos = getSeatPosition(visualIdx, state.maxPlayers);

    let cls = 'seat occupied';
    if (sId === myToken) cls += ' is-me';
    if (player.folded) cls += ' folded';
    if (i === state.actionSeat && state.phase !== 'waiting' && state.phase !== 'game_over') cls += ' active-player';
    if (!player.isActive && !player.isBusted && state.phase !== 'waiting' && state.phase !== 'game_over') cls += ' is-waiting';
    if (player.isBusted) cls += ' is-busted';

    const aId = player.avatarId !== undefined ? player.avatarId : 0;
    const spriteX = (aId % 5) * 25; const spriteY = Math.floor(aId / 5) * 50;

    let avatarHtml = `<div class="seat-avatar ${player.avatarId !== undefined ? 'has-sprite' : ''}">`;
    if (player.avatarId !== undefined) { avatarHtml += `<div class="avatar-sprite" style="background-position: ${spriteX}% ${spriteY}%"></div>`; }
    
    if (player.lastAction) {
       const actClass = player.lastAction.toLowerCase().replace('-', '');
       avatarHtml += `<div class="action-tag ${actClass}">${player.lastAction}</div>`;
    }

    if (player.isDisconnected) { avatarHtml += `<div class="offline-text">OFFLINE</div>`; 
    } else if (player.isBusted) { avatarHtml += `<div class="busted-text">ELIMINATED</div>`;
    } else if (!player.isActive && state.phase !== 'waiting' && state.phase !== 'game_over') { avatarHtml += `<div class="waiting-text">WAITING</div>`; }
    avatarHtml += `</div>`;

    let cardsHtml = '';
    if (!player.folded && player.cardCount > 0 && !player.isBusted) {
      if (player.holeCards.length === 2 && player.holeCards[0].rank !== '?') {
         const c1 = player.holeCards[0]; const c2 = player.holeCards[1];
         const c1Key = c1.rank + c1.suit; const c2Key = c2.rank + c2.suit;
         
         const h1 = isShowdownReveal && winningCards.includes(c1Key);
         const d1 = isShowdownReveal && !winningCards.includes(c1Key);
         const h2 = isShowdownReveal && winningCards.includes(c2Key);
         const d2 = isShowdownReveal && !winningCards.includes(c2Key);
         
         cardsHtml = getSvgCard(c1.rank, c1.suit, false, h1, d1, state.cardBack) + getSvgCard(c2.rank, c2.suit, false, h2, d2, state.cardBack);
         
         if (sId === myToken) {
             document.getElementById('my-cards').innerHTML = getSvgCard(c1.rank, c1.suit, false, false, false, state.cardBack) + getSvgCard(c2.rank, c2.suit, false, false, false, state.cardBack);
         }
      } else { 
         cardsHtml = getSvgCard('?', '?', true, false, false, state.cardBack) + getSvgCard('?', '?', true, false, false, state.cardBack); 
      }
    }

    seatsHtml += `
      <div class="${cls}" style="left:${pos.left}; top:${pos.top}">
        ${cardsHtml ? `<div class="seat-cards">${cardsHtml}</div>` : ''}
        ${avatarHtml}
        <div class="seat-name">${player.name}</div>
        <div class="seat-chips">C: ${player.chips}</div>
        ${player.bet > 0 ? `<div class="seat-bet">B: ${player.bet}</div>` : ''}
      </div>
    `;
  }
  document.getElementById('seats-layer').innerHTML = seatsHtml;

  let commHtml = '';
  for(let i=0; i<5; i++) {
    if (state.communityCards[i]) {
       const c = state.communityCards[i];
       const cardKey = c.rank + c.suit;
       const h = isShowdownReveal && winningCards.includes(cardKey);
       const d = isShowdownReveal && !winningCards.includes(cardKey);
       commHtml += getSvgCard(c.rank, c.suit, false, h, d, state.cardBack);
    } else {
       commHtml += getSvgCard('?','?', true, false, false, state.cardBack);
    }
  }
  document.getElementById('community-cards').innerHTML = commHtml;

  const isMyTurn = (state.actionSeat !== -1 && state.seats[state.actionSeat] === myToken && state.phase !== 'showdown' && state.phase !== 'game_over');
  document.getElementById('table-glow').className = isMyTurn ? 'table-glow my-turn' : 'table-glow';
  document.getElementById('not-your-turn').style.display = 'none'; document.getElementById('your-turn-controls').style.display = 'none'; document.getElementById('manual-rebuy-controls').style.display = 'none';

  if (isMyTurn) {
    document.getElementById('your-turn-controls').style.display = 'block'; const callAmt = Math.max(0, state.currentBet - (myPlayer.bet || 0));
    document.getElementById('call-amount').textContent = callAmt > 0 ? callAmt : ''; document.getElementById('btn-check').style.display = callAmt === 0 ? 'inline-block' : 'none'; document.getElementById('btn-call').style.display = callAmt > 0 ? 'inline-block' : 'none'; document.getElementById('raise-input').value = state.currentBet + state.bigBlind;
  } else if (state.phase === 'game_over') {
    document.getElementById('not-your-turn').style.display = 'block'; const winner = Object.values(state.players).find(p => !p.isBusted);
    if (winner) document.getElementById('not-your-turn').innerHTML = `<span style="color:var(--neon-cyan); font-weight:900; font-size: 1rem; letter-spacing: 0.1em;">🏆 ${winner.name} WINS! 🏆</span>`;
  } else if (myPlayer && myPlayer.chips === 0 && !myPlayer.isBusted && state.phase === 'waiting' && state.allowRebuy && (state.maxRebuys === -1 || myPlayer.rebuyCount < state.maxRebuys)) {
    document.getElementById('manual-rebuy-controls').style.display = 'block';
  } else {
    document.getElementById('not-your-turn').style.display = 'block';
    if (myPlayer && myPlayer.isBusted) { document.getElementById('not-your-turn').innerHTML = '<span style="color:var(--neon-magenta); font-weight:900; font-size: 1rem; letter-spacing: 0.2em;">ELIMINATED</span>';
    } else if (myPlayer && !myPlayer.isActive && state.phase !== 'waiting' && state.phase !== 'game_over') { document.getElementById('not-your-turn').innerHTML = '<span style="color:var(--neon-cyan); font-weight:900; letter-spacing: 0.1em;">WAITING FOR NEXT HAND...</span>';
    } else { document.getElementById('not-your-turn').innerHTML = 'AWAITING NETWORK ACTION...'; }
  }
}

function toggleAutoRebuy(val) { socket.emit('toggle_auto_rebuy', val); }
function doRebuy() { socket.emit('rebuy'); }
function startGame() { socket.emit('start_game'); }
function restartTournament() { socket.emit('restart_tournament'); }
function callClock() { socket.emit('call_clock'); } 
function doAction(action) {
  if (action === 'fold') playSfx('fold');
  if (action === 'call' || action === 'raise' || action === 'allin') playSfx('chips');
  let amt = action === 'raise' ? parseInt(document.getElementById('raise-input').value) : 0;
  socket.emit('player_action', { action, amount: amt });
}
function sendChat() {
  const i = document.getElementById('chat-input');
  if(i.value) { socket.emit('chat', {msg: i.value}); i.value=''; }
}
</script>
